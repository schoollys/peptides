name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub Organizations.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  engine:
    name: Scoring engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core-scoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/core-scoring/package-lock.json
      - run: npm ci
      - run: npm test

  web:
    name: Frontend lint & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-kit/peptide-trust-app-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-kit/peptide-trust-app-setup/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Dependency audit (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
